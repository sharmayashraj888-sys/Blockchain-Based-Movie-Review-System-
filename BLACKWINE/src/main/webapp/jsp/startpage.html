<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLACKWINE | Discover Movies & Series</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== BACKGROUND ===== */
body{
    height:100vh;
    background:
        radial-gradient(circle at top, #2b2b2b 0%, #141414 45%, #000000 100%);
    color:#ffffff;
    overflow:hidden;
}

/* ===== LOGO SECTION ===== */
.logo-wrap{
    position:absolute;
    left:80px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    gap:26px;
}

/* ===== LOGO IMAGE (FIXED SIZE + VIBRANT) ===== */
.logo-wrap img{
    width:180px;          /* FIXED SIZE */
    height:auto;
    max-width:180px;

    filter:
        brightness(1.4)
        contrast(1.3)
        drop-shadow(0 0 20px rgba(255,255,255,0.4))
        drop-shadow(0 0 40px rgba(255,255,255,0.15));

    mix-blend-mode:screen;
  
}

/* LOGO TEXT */
.logo-text h1{
    font-size:48px;
    font-weight:800;
    letter-spacing:6px;
}

.logo-text p{
    margin-top:6px;
    font-size:14px;
    letter-spacing:3px;
    color:#bdbdbd;
}

/* FLOAT ANIMATION */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* ===== RIGHT PANEL ===== */
.panel{
    position:absolute;
    right:90px;
    top:50%;
    transform:translateY(-50%);
    width:420px;
    padding:50px;
    border-radius:26px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    box-shadow:0 0 70px rgba(0,0,0,0.6);
}

.panel h2{
    font-size:28px;
    letter-spacing:3px;
    margin-bottom:12px;
}

.panel p{
    font-size:14px;
    color:#bdbdbd;
    margin-bottom:30px;
}

/* BUTTON */
.panel button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:26px;
    font-size:16px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#ffffff,#bdbdbd);
    color:#000000;
    transition:0.3s;
}

.panel button:hover{
    transform:scale(1.05);
    box-shadow:0 0 35px rgba(255,255,255,0.5);
}

/* ===== RESPONSIVE FIX ===== */
@media (max-width: 900px){
    .logo-wrap{
        left:40px;
    }
    .logo-wrap img{
        width:90px;
        max-width:90px;
    }
    .panel{
        right:40px;
        width:360px;
    }
}
</style>
</head>

<body>

<!-- LOGO SECTION -->
<div class="logo-wrap">
    <img src="logo2.png" alt="BLACKWINE Logo">
    <div class="logo-text">
        <h1>BLACKWINE</h1>
        <p>Discover • Rate • Recommend</p>
    </div>
</div>

<!-- RIGHT PANEL -->
<div class="panel">
    <h2>Welcome to BLACKWINE</h2>
    <p>
        Your destination for discovering, rating, and exploring
        movies and series — inspired by IMDb.
    </p>

   <a href="login.jsp"> <button>CONTINUE</button></a>
</div>

</body>
</html>
