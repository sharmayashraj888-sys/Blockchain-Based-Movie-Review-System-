<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLACKWINE | Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

:root{
  --gold:#d4af37;
  --gold-dim:rgba(212,175,55,0.12);
  --bg:#0a0a0a;
  --surface:#0e0e0e;
  --border:rgba(255,255,255,0.07);
  --text-muted:#555;
}

body{
  min-height:100vh;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
  animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

/* ===== HEADER ===== */
header{
  position:sticky;top:0;z-index:200;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;padding:18px 60px;
  background:rgba(10,10,10,0.75);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px);
}

.logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
.logo img{width:40px;animation:glow 4s ease-in-out infinite;}
@keyframes glow{
  0%,100%{filter:brightness(1.05) drop-shadow(0 0 6px rgba(255,255,255,0.15));}
  50%     {filter:brightness(1.2)  drop-shadow(0 0 16px rgba(255,255,255,0.35));}
}
.logo-text{
  font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;
  letter-spacing:4px;color:#fff;position:relative;overflow:hidden;
}
.logo-text::after{
  content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
  transform:skewX(-20deg);animation:shine 4s ease-in-out infinite;
}
@keyframes shine{0%{left:-100%}50%,100%{left:120%}}

.header-right{display:flex;align-items:center;gap:14px;}
.back-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 22px;border-radius:30px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:#aaa;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:0.3s ease;
}
.back-btn:hover{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.2);}

/* ===== HERO BANNER ===== */
.profile-hero{
  position:relative;
  padding:70px 60px 0;
  overflow:hidden;
}
/* ambient glow */
.profile-hero::before{
  content:"";position:absolute;
  top:-100px;left:-100px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(212,175,55,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.profile-hero::after{
  content:"";position:absolute;
  top:0;left:60px;
  width:120px;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);
}

.breadcrumb{
  font-size:10px;color:#444;letter-spacing:4px;
  text-transform:uppercase;margin-bottom:36px;
}
.breadcrumb span{color:var(--gold);}

/* ===== PROFILE CARD ===== */
.profile-card{
  display:flex;gap:50px;align-items:flex-start;
  position:relative;z-index:1;
}

/* ===== AVATAR ===== */
.avatar-col{display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0;}

.avatar-container{
  position:relative;width:160px;height:160px;
}

/* outer gold ring */
.avatar-ring{
  position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),rgba(212,175,55,0.2),var(--gold));
  padding:3px;animation:ringPulse 3s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0.2);}
  50%{box-shadow:0 0 0 10px rgba(212,175,55,0);}
}
.avatar-inner{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:#111;border:3px solid var(--bg);
}
.avatar-inner img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.4s ease;
}
.avatar-container:hover .avatar-inner img{transform:scale(1.08);}

.camera-overlay{
  position:absolute;bottom:4px;right:4px;z-index:5;
  width:38px;height:38px;border-radius:50%;
  background:var(--gold);color:#000;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  cursor:pointer;border:3px solid var(--bg);
  opacity:0;transform:scale(0.7);transition:0.3s ease;
}
.avatar-container:hover .camera-overlay{opacity:1;transform:scale(1);}

.upload-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 20px;border-radius:20px;
  background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);
  color:var(--gold);font-size:13px;font-weight:600;letter-spacing:1px;
  cursor:pointer;transition:0.3s;
}
.upload-btn:hover{background:rgba(212,175,55,0.15);box-shadow:0 0 16px rgba(212,175,55,0.2);}

.save-btn{
  display:none;
  padding:9px 22px;border:none;border-radius:20px;
  background:linear-gradient(135deg,var(--gold),#a08020);
  color:#000;font-weight:700;font-size:13px;letter-spacing:1px;
  cursor:pointer;transition:0.3s;
}
.save-btn:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(212,175,55,0.4);}

/* ===== PROFILE INFO ===== */
.profile-info{flex:1;padding-top:8px;}

.member-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;
  background:var(--gold-dim);border:1px solid rgba(212,175,55,0.2);
  font-size:10px;color:var(--gold);letter-spacing:3px;margin-bottom:16px;
}
.chain-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

.username{
  font-family:'Oswald',sans-serif;
  font-size:54px;font-weight:700;letter-spacing:2px;line-height:1;
  color:#fff;margin-bottom:10px;
}
.username .gold{color:var(--gold);}

.profile-sub{
  font-size:12px;color:#444;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:30px;
}

/* ===== STATS ROW ===== */
.stats-row{
  display:flex;gap:1px;border-radius:16px;overflow:hidden;
  border:1px solid var(--border);margin-bottom:30px;width:fit-content;
}
.stat-box{
  padding:20px 36px;text-align:center;background:var(--surface);
  position:relative;transition:0.3s;
}
.stat-box:not(:last-child)::after{
  content:"";position:absolute;right:0;top:20%;height:60%;
  width:1px;background:rgba(255,255,255,0.07);
}
.stat-box:hover{background:#141414;}
.stat-num{
  display:block;
  font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:var(--gold);line-height:1;
}
.stat-num.white{color:#fff;}
.stat-lbl{
  display:block;
  font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:6px;
}

/* fav genre badge */
.genre-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:20px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  font-size:12px;color:#999;letter-spacing:1px;margin-right:8px;
}

/* ===== DIVIDER ===== */
.section-divider{
  margin:60px 60px 0;
  height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);
}

/* ===== RATINGS SECTION ===== */
.lower{padding:40px 60px 80px;}

.section-head{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.section-head-title{
  font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;
  letter-spacing:4px;white-space:nowrap;
}
.section-head-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.1),transparent);}
.section-head-count{font-size:11px;color:#444;letter-spacing:2px;}

/* ===== RATED GRID ===== */
.rated-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.movie-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;padding:20px 22px;
  position:relative;overflow:hidden;
  transition:transform 0.3s ease,box-shadow 0.3s ease,border-color 0.3s;
  animation:cardIn 0.4s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.movie-card:hover{
  transform:translateY(-5px);
  box-shadow:0 16px 50px rgba(0,0,0,0.7);
  border-color:rgba(212,175,55,0.2);
}
.movie-card::before{
  content:"";position:absolute;left:0;top:15%;height:70%;width:2px;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);
  border-radius:2px;opacity:0;transition:0.3s;
}
.movie-card:hover::before{opacity:1;}

.movie-card h4{
  font-size:14px;font-weight:600;color:#fff;
  margin-bottom:10px;line-height:1.3;
}
.movie-rating{
  display:flex;align-items:center;gap:8px;
}
.rating-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.rating-bar{height:100%;background:var(--gold);border-radius:2px;transition:width 0.8s ease;}
.rating-val{
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--gold);
}
.rating-max{font-size:11px;color:#444;}

/* empty state */
.empty-state{
  grid-column:1/-1;text-align:center;padding:60px 20px;
}
.empty-icon{font-size:48px;opacity:0.15;display:block;margin-bottom:14px;}
.empty-text{font-size:12px;color:#444;letter-spacing:3px;text-transform:uppercase;}
</style>
</head>

<body>

<script>
const user = localStorage.getItem("loggedInUser");
if (!user) window.location.href = "login.html";
</script>

<!-- HEADER -->
<header>
  <div class="logo" onclick="goHome()">
    <img src="logo2.png" alt="BW" onerror="this.onerror=null;this.style.display='none'">
    <span class="logo-text">BLACKWINE</span>
  </div>
  <div></div>
  <div class="header-right">
    <button class="back-btn" onclick="goHome()">
      <i class="fas fa-arrow-left" style="font-size:10px"></i> Home
    </button>
  </div>
</header>

<!-- PROFILE HERO -->
<div class="profile-hero">
  <div class="breadcrumb">BLACKWINE &nbsp;<span>/</span>&nbsp; PROFILE DASHBOARD</div>

  <div class="profile-card">

    <!-- AVATAR -->
    <div class="avatar-col">
      <div class="avatar-container">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <img id="profileAvatar" src="default-avatar.png" alt="avatar">
          </div>
        </div>
        <div class="camera-overlay" onclick="document.getElementById('avatarInput').click()">
          <i class="fas fa-camera"></i>
        </div>
      </div>

      <label for="avatarInput" class="upload-btn">
        <i class="fas fa-upload" style="font-size:11px"></i>
        Change Avatar
      </label>
      <input type="file" id="avatarInput" accept="image/*" hidden onchange="previewAvatar(event)">
      <button class="save-btn" id="saveBtn" onclick="saveAvatar()">
        <i class="fas fa-check" style="font-size:11px"></i> Save Avatar
      </button>
    </div>

    <!-- INFO -->
    <div class="profile-info">
      <div class="member-badge"><div class="chain-dot"></div>BLACKWINE MEMBER</div>

      <div class="username" id="usernameDisplay">—</div>
      <div class="profile-sub">Film enthusiast &nbsp;•&nbsp; Blockchain reviewer</div>

      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-num" id="ratedCount">0</span>
          <span class="stat-lbl">Movies Rated</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="avgScore">—</span>
          <span class="stat-lbl">Avg Rating</span>
        </div>
        <div class="stat-box">
          <span class="stat-num white" id="wlCount">0</span>
          <span class="stat-lbl">Watchlisted</span>
        </div>
        <div class="stat-box">
          <span class="stat-num white" id="topScore">—</span>
          <span class="stat-lbl">Top Rated</span>
        </div>
      </div>

      <div id="genreTags"></div>
    </div>

  </div>
</div>

<div class="section-divider"></div>

<!-- RATINGS SECTION -->
<div class="lower">
  <div class="section-head">
    <div class="section-head-title">YOUR RATINGS</div>
    <div class="section-head-line"></div>
    <div class="section-head-count" id="ratingsBadge">0 FILMS</div>
  </div>

  <div class="rated-grid" id="ratedList"></div>
</div>

<script>
// ── INIT ──────────────────────────────────────────────────────
document.getElementById("usernameDisplay").innerHTML =
    user.length > 1
        ? `<span class="gold">${user.charAt(0).toUpperCase()}</span>${user.slice(1)}`
        : user.toUpperCase();

const savedAv = localStorage.getItem("userAvatar_" + user);
if (savedAv) document.getElementById("profileAvatar").src = savedAv;

// ── LOAD RATINGS ──────────────────────────────────────────────
const ratings = JSON.parse(localStorage.getItem("userRatings_" + user)) || {};
const ratedMovies = Object.keys(ratings);

document.getElementById("ratedCount").innerText = ratedMovies.length;
document.getElementById("ratingsBadge").innerText = ratedMovies.length + " FILMS";

// watchlist count
const wl = JSON.parse(localStorage.getItem("watchlist")) || [];
document.getElementById("wlCount").innerText = wl.length;

if (ratedMovies.length > 0) {
    const total = ratedMovies.reduce((sum, m) => sum + ratings[m], 0);
    const avg = (total / ratedMovies.length).toFixed(1);
    document.getElementById("avgScore").innerText = avg;

    const maxScore = Math.max(...ratedMovies.map(m => ratings[m]));
    document.getElementById("topScore").innerText = maxScore + "/10";

    // render cards with staggered animation
    const list = document.getElementById("ratedList");
    ratedMovies.forEach((movie, i) => {
        const pct = (ratings[movie] / 10) * 100;
        const card = document.createElement("div");
        card.className = "movie-card";
        card.style.animationDelay = (i * 0.05) + "s";
        card.innerHTML = `
            <h4>${movie}</h4>
            <div class="movie-rating">
                <div class="rating-bar-wrap">
                    <div class="rating-bar" style="width:0%" data-pct="${pct}"></div>
                </div>
                <span class="rating-val">${ratings[movie]}</span>
                <span class="rating-max">/10</span>
            </div>`;
        list.appendChild(card);
    });

    // animate bars after paint
    requestAnimationFrame(() => {
        document.querySelectorAll(".rating-bar").forEach(bar => {
            bar.style.width = bar.dataset.pct + "%";
        });
    });
} else {
    document.getElementById("ratedList").innerHTML = `
        <div class="empty-state">
            <span class="empty-icon">🎬</span>
            <div class="empty-text">No films rated yet — go explore!</div>
        </div>`;
}

// ── AVATAR ────────────────────────────────────────────────────
let tempAvatar = null;

function previewAvatar(event) {
    const reader = new FileReader();
    reader.onload = function() {
        tempAvatar = reader.result;
        document.getElementById("profileAvatar").src = tempAvatar;
        document.getElementById("saveBtn").style.display = "inline-block";
    };
    reader.readAsDataURL(event.target.files[0]);
}

function saveAvatar() {
    if (tempAvatar) {
        localStorage.setItem("userAvatar_" + user, tempAvatar);
        alert("Avatar saved!");
        document.getElementById("saveBtn").style.display = "none";
    }
}

function goHome() {
    window.location.href = "../jsp/home.html";
}
</script>

</body>
</html>
